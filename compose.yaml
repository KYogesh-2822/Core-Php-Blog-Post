# Comments are provided throughout this file to help you get started.
# If you need more help, visit the Docker Compose reference guide at
# https://docs.docker.com/go/compose-spec-reference/

# Here the instructions define your application as a service called "server".
# This service is built from the Dockerfile in the current directory.
# You can add other services your application may depend on here, such as a
# database or a cache. For examples, see the Awesome Compose repository:
# https://github.com/docker/awesome-compose


services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: core_php_blog_app
    ports:
      - "9001:80"
    volumes:
      - ./Core-Php:/var/www/html
    depends_on:
      - db
    environment:
      APP_ENV: development
      MAIL_HOST: mailtrap
      MAIL_PORT: 25
      MAIL_USERNAME: ""
      MAIL_PASSWORD: ""
      MAIL_FROM: noreply@phpblog.com
      MAIL_FROM_NAME: PHP Blog
      MAIL_ENCRYPTION: ""

  db:
    image: mysql:8.0
    container_name: core_php_blog_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: core_php_blog
      MYSQL_USER: blog_user
      MYSQL_PASSWORD: blog_password
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: core_php_blog_phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    depends_on:
      - db

  mailtrap:
    image: eaudeweb/mailtrap
    container_name: blog_mailtrap
    ports:
      - "8082:80"
      - "1025:25"

volumes:
  db_data:

  
